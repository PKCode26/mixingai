worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Uploads und Exporte: grosszuegiges Limit fuer PDF/Excel
    client_max_body_size 100M;

    # Timeouts fuer grosse Uploads und lange OCR-/Export-Jobs
    proxy_read_timeout    300s;
    proxy_connect_timeout  60s;
    proxy_send_timeout    300s;

    # HTTP -> HTTPS Redirect
    server {
        listen 80;
        server_name mixingai.amixon.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name mixingai.amixon.local;

        # TLS-Zertifikat aus amixon-interner CA oder selbst signiert
        # Zertifikat-Dateien NICHT in Git einchecken
        ssl_certificate     /etc/nginx/certs/mixingai.crt;
        ssl_certificate_key /etc/nginx/certs/mixingai.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Header fuer interne Webanwendung
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # Proxy an ASP.NET Core API
        location / {
            proxy_pass         http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
